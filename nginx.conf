# Nginx config for truckdriverjobs.co
# Place at: /etc/nginx/sites-available/truckdriverjobs.co
# Then: ln -s /etc/nginx/sites-available/truckdriverjobs.co /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx
# SSL: sudo certbot --nginx -d truckdriverjobs.co -d www.truckdriverjobs.co

server {
    listen 80;
    server_name truckdriverjobs.co www.truckdriverjobs.co;

    # Certbot will add SSL config here automatically
    # For now HTTP works, run certbot to upgrade to HTTPS

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts for long-running scrape requests
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
