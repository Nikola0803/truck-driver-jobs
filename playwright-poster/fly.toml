app = "tdj-poster"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  # Sleep when idle, wake on request — keeps cost ~$3-4/month
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  # 512 MB RAM minimum for Playwright/Chromium
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
