name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "📦 Pulling latest code..."
            cd /var/www/truck-driver-jobs
            git pull origin main

            echo "📦 Installing dependencies..."
            npm ci --prefer-offline

            echo "🔨 Building frontend..."
            npm run build

            echo "🔁 Restarting app..."
            pm2 restart truck-driver-jobs --update-env || pm2 start ecosystem.config.cjs --update-env

            echo "✅ Deploy complete"
            pm2 status
